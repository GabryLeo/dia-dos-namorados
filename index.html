<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Tinhamu</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0d1b2a;
      font-family: 'Georgia', serif;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-y: auto;
      position: relative;
    }

    .container {
      border: 5px solid #00b4d8;
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 0 25px #00b4d8;
      text-align: center;
      max-width: 800px;
      background-color: #1a2639;
      z-index: 1;
    }

    audio {
      display: none;
    }

    h1 {
      font-size: 3em;
      color: #00b4d8;
      margin-bottom: 10px;
      margin-top: 10px;
    }

    .timer {
      font-size: 1.5em;
      margin: 20px 0;
      color: #a8dadc;
    }

    .carrossel {
      position: relative;
      width: 100%;
      max-width: 620px;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 15px;
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease;
    }

    .slides img {
      min-width: 100%;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0, 180, 216, 0.5);
      object-fit: cover;
    }

    .btn-carrossel {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0, 180, 216, 0.7);
      border: none;
      color: white;
      font-size: 2rem;
      padding: 10px 16px;
      cursor: pointer;
      border-radius: 50%;
      z-index: 10;
    }

    .btn-esquerda {
      left: 10px;
    }

    .btn-direita {
      right: 10px;
    }

    .btn-carrossel:hover {
      background-color: rgba(0, 180, 216, 1);
    }

    .frases {
      font-size: 1.2em;
      white-space: pre-line;
      color: #f1faee;
      margin-top: 30px;
    }

    .emoji {
      position: absolute;
      top: -50px;
      font-size: 2rem;
      animation: cair 8s linear infinite;
      opacity: 0.8;
      z-index: 0;
    }

    @keyframes cair {
      0% {
        transform: translateY(-50px);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <script>
    const quantidade = 15;
    for (let i = 0; i < quantidade; i++) {
      const emoji = document.createElement('div');
      emoji.classList.add('emoji');
      emoji.style.left = Math.random() * 100 + 'vw';
      emoji.style.animationDuration = (Math.random() * 5 + 5) + 's';
      emoji.style.fontSize = (Math.random() * 10 + 20) + 'px';
      emoji.textContent = '💌';
      document.body.appendChild(emoji);
    }
  </script>

  <div class="container">
    <audio autoplay loop>
      <source src="die-with-a-smile.mp3" type="audio/mpeg">
      Seu navegador não suporta áudio.
    </audio>

    <h1>Tinhamu 💕</h1>

    <div class="timer" id="contador">Carregando amor... 💞</div>

    <div class="carrossel">
      <button class="btn-carrossel btn-esquerda" onclick="mudarSlide(-1)">&#8592;</button>

      <div class="slides" id="slides">
        <img src="Imagem do WhatsApp de 2025-06-10 à(s) 20.21.40_09e80d33.jpg" alt="Foto 1">
        <img src="Imagem do WhatsApp de 2025-06-10 à(s) 20.21.40_1a99822a.jpg" alt="Foto 2">
        <img src="Imagem do WhatsApp de 2025-06-10 à(s) 20.21.40_1cb63be9.jpg" alt="Foto 3">
      </div>

      <button class="btn-carrossel btn-direita" onclick="mudarSlide(1)">&#8594;</button>
    </div>

    <div class="frases">
      Minha amiga<br>
      Minha companheira<br>
      Minha paixão<br>
      Meu porto seguro<br>
      Meu amor<br>
      Te amo 💖
    </div>
  </div>

  <script>
    // Contador
    const inicio = new Date("2024-10-26T00:00:00");
    const contador = document.getElementById("contador");

    function atualizarTempo() {
      const agora = new Date();
      let diff = agora - inicio;

      if (diff < 0) {
        contador.textContent = "A contagem começa em 26/10/2024 💞";
        return;
      }

      let segundos = Math.floor(diff / 1000);
      let minutos = Math.floor(segundos / 60);
      let horas = Math.floor(minutos / 60);
      let dias = Math.floor(horas / 24);
      let meses = Math.floor(dias / 30);
      let anos = Math.floor(meses / 12);

      segundos = segundos % 60;
      minutos = minutos % 60;
      horas = horas % 24;
      dias = dias % 30;
      meses = meses % 12;

      contador.textContent = `${anos} anos, ${meses} meses, ${dias} dias, ${horas} horas, ${minutos} minutos, ${segundos} segundos juntos 💞`;
    }

    setInterval(atualizarTempo, 1000);
    atualizarTempo();

    // Carrossel
    let atual = 0;
    const slides = document.getElementById('slides');
    const total = slides.children.length;

    function mudarSlide(direcao) {
      atual = (atual + direcao + total) % total;
      slides.style.transform = `translateX(-${atual * 100}%)`;
    }
  </script>

</body>
</html>
